<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaida OS - Web Console [KTRP]</title>
    <style>
        body {
            background: #050505;
            color: #00e5ff;
            font-family: monospace;
            margin: 0;
            padding: 20px;
        }
        button {
            background: #00e5ff;
            color: #050505;
            border: 1px solid #00e5ff;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s, color 0.2s;
        }
        button:hover {
            background: #050505;
            color: #00e5ff;
        }
        #app-ui {
            margin-top: 20px;
            border: 1px solid #00e5ff;
            padding: 20px;
            display: none; /* Hidden strictly by default until auth confirms */
        }
        #output {
            margin-top: 20px;
            white-space: pre-wrap;
            border-top: 1px dashed #00e5ff;
            padding-top: 10px;
            font-size: 0.9em;
        }
        #user-email {
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>[KTRP] NEXUS ACCESS TERMINAL</h1>
    
    <button id="login-btn">Login</button>
    <button id="logout-btn" style="display:none;">Logout</button>
    <div id="user-email"></div>

    <div id="app-ui">
        <h2>System Directives</h2>
        <button id="generate">Generate Payload</button>
    </div>

    <div id="output">[SYS_INIT] Real DOM ready...</div>

    <script type="module" src="app.js"></script>
</body>
</html>
